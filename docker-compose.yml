services:
  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build: ./backend/src
    ports:
      - "8000:8000"
    volumes:
      - ./backend/src:/app
      - ./backend/scripts:/app/scripts
      - ./backend/data:/app/data
    env_file:
      - ./backend/.env
    environment:
      # Las variables de Chroma se leen desde .env
      - PYTHONUNBUFFERED=1
    # depends_on:
    #   chromadb:
    #     condition: service_healthy
    #   db:
    #     condition: service_started
    restart: unless-stopped

